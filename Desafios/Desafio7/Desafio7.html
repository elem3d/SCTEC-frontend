<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List</title>
    <link rel="stylesheet" href="style7.css">
</head>
<body>
    <div class="listaContainer">
        <h1>TO-DO LIST</h1>
        <label for="newItem">Adicione ítens à sua lista de tarefas</label>
        <div class="inputContainer">
            <input type="text" id="newItem" placeholder="Digite uma tarefa">
            <button id="newItemButton">Adicionar à lista</button>
        </div>
        <ul id="lista">
            <li>
                <input type="checkbox" id="teste">
                <label for="teste">Tarefa Teste</label>
            </li>
        </ul>
    </div>
   


    <script src="./script7.js"></script>
</body>
</html>
