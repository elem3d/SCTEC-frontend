<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script4.js"></script>
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
            padding: 20px;
            background-color: rgba(255, 205, 205, 0.759);
            border-radius: 50px;
        }
        .divTrocaCor {
            width: 100px;
            height: 100px;
            margin: 10px;
            display: inline-block;
            border: 1px solid rgb(70, 0, 0);
            border-radius: 50%;
            background-color: rgb(255, 255, 255);
        }
        button {
            margin-right: 20px;
            margin-bottom: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            color: brown;
            background-color: rgba(255, 99, 71, 0.5);
            border-style: outset;
            border-color: rgb(255, 71, 71);
            border-radius: 5%;
        }

        .calculadoraContainer {
            display: flex;
            flex-direction: column;
            align-items: start;
            max-width: 300px;
        }
        .calculadoraContainer input {
            margin-bottom: 10px;
            padding: 8px;
            font-size: 14px;
        }
        
        section{
            background-color: rgba(255, 205, 205, 0.759);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 30px;
        }
        
        #exercicioCalc{
            margin: 0 20% 0;
            height: 400px;
            justify-content: center;
        }

        #exercicioCalc h2{
            background-color: rgba(255, 99, 71, 0.5);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        body{
            font-family: Arial, sans-serif;
            padding: 20px;
            display: grid;
            gap: 20px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            color: brown;
            background-image: url(https://i.pinimg.com/1200x/cf/cd/69/cfcd691dd66f17ef5fe8a90d79940642.jpg);
        }
        #exercicioIdioma{
            margin: 0 10% 0;
            padding: 10px;
            justify-content: center;
        }
        #exercicioIdioma h2{
            background-color: rgba(255, 99, 71, 0.5);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        #exercicioIdioma input, #exercicioIdioma select{
            margin: 5px;
            padding: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Exercícios com JavaScript</h1>
    <section id="exercicioCor">
        <h2>Botão Troca de Cor Aleatória</h2>
        <div class="botoesContainer">
            <button id="botaoTrocaCor" onclick="trocaCor()">Trocar a cor</button> 
            <button id="botaoReset" onclick="resetColor()">Reset</button>
        </div>
        <div class="divsContainer">
            <div id="div-1" class="divTrocaCor"></div>
            <div id="div-2" class="divTrocaCor"></div>
            <div id="div-3" class="divTrocaCor"></div>
        </div>
        
    </section>

    <section id="exercicioCalc">
        <h2>CALCULADORA BÁSICA</h2>
        <p>Operadores válidos: +, -, *, /</p>
        <div class="calculadoraContainer">
            <input type="text" id="num1" placeholder="Digite o primeiro número">
            <input type="text" id="num2" placeholder="Digite o segundo número">
            <input type="text" id="operador" placeholder="Digite o operador">
            <div class="botoesContainer">
                <button onclick="calcular()">Calcular</button>
                <button onclick="limparCampos()">Limpar</button>
            </div>
        </div>
        <p id="resultado"></p>
    </section>
    
    <section id="exercicioIdioma">
        <h2>SAUDAÇÃO EM DIFERENTES IDIOMAS</h2>
        <p>Escolha um idioma para receber uma saudação personalizada.</p>
        <div class="inputContainer">
            <input type="text" id="nome" placeholder="Digite seu nome">
        <select name="idioma" id="idioma">
            <option value="default">Escolha um Idioma</option>
            <option value="portugues">Português</option>
            <option value="ingles">Inglês</option>
            <option value="espanhol">Espanhol</option>
            <option value="frances">Francês</option>
            <option value="alemao">Alemão</option>
            <option value="japones">Japonês</option>
            <option value="chines">Mandarim</option>
            <option value="russo">Russo</option>
            <option value="arabe">Árabe</option>
            <option value="hindi">Hindi</option>
            <option value="coreano">Coreano</option>
            <option value="tailandes">Tailandês</option>
        </select>
        </div>
        <div class="botoesContainer">
            <button onclick="saudar()">Saudar</button>
            <button onclick="limparSaudacao()">Limpar</button>
        </div>
        <p id="saudacao"></p>
    </section>
</html>
